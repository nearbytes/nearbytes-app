name: Windows MEGAcmd Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub release tag that will receive the helper asset
        required: true
        default: megacmd-helper-win32-x64
      release_title:
        description: GitHub release title
        required: true
        default: Nearbytes Windows MEGAcmd Helper
      prerelease:
        description: Mark the release as a prerelease
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-helper:
    name: Build Windows helper
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize vendored MEGAcmd submodules
        shell: pwsh
        run: |
          git submodule sync -- vendor/MEGAcmd
          git submodule update --init --recursive vendor/MEGAcmd

      - name: Configure git for long paths
        run: git config --global core.longpaths true

      - name: Reset vendored vcpkg checkout
        shell: pwsh
        run: |
          if (Test-Path vendor/vcpkg) {
            Remove-Item -Recurse -Force vendor/vcpkg
          }

      - name: Configure vendored Windows helper
        shell: pwsh
        run: |
          $buildDir = Join-Path $PWD 'vendor/MEGAcmd/build/build-cmake-Release'
          if (Test-Path $buildDir) {
            Remove-Item -Recurse -Force $buildDir
          }
          cmake -S vendor/MEGAcmd -B $buildDir -DCMAKE_BUILD_TYPE=Release -DFULL_REQS=OFF -DUSE_FFMPEG=OFF -DUSE_PDFIUM=OFF -DUSE_FREEIMAGE=OFF -DENABLE_MEDIA_FILE_METADATA=OFF -DUSE_MEDIAINFO=OFF

      - name: Build vendored Windows helper
        shell: pwsh
        run: |
          cmake --build vendor/MEGAcmd/build/build-cmake-Release --config Release

      - name: Stage helper bundle
        shell: pwsh
        run: |
          $repoRoot = (Get-Location).Path
          $buildDir = Join-Path $repoRoot 'vendor/MEGAcmd/build/build-cmake-Release'
          $bundleRoot = Join-Path $repoRoot 'artifacts/megacmd-release/win32-x64'
          $binDir = Join-Path $bundleRoot 'bin'

          if (Test-Path $bundleRoot) {
            Remove-Item -Recurse -Force $bundleRoot
          }
          New-Item -ItemType Directory -Force -Path $binDir | Out-Null

          Copy-Item (Join-Path $buildDir 'MEGAclient.exe') (Join-Path $binDir 'MEGAclient.exe')
          Copy-Item (Join-Path $buildDir 'MEGAclient.exe') (Join-Path $binDir 'MegaClient.exe')
          Copy-Item (Join-Path $buildDir 'MEGAcmdServer.exe') (Join-Path $binDir 'MEGAcmdServer.exe')

          $shellPath = Join-Path $buildDir 'MEGAcmdShell.exe'
          if (Test-Path $shellPath) {
            Copy-Item $shellPath (Join-Path $binDir 'MEGAcmdShell.exe')
          }

          Get-ChildItem (Join-Path $repoRoot 'vendor/MEGAcmd/src/client/win') -Filter 'mega-*.bat' -File |
            ForEach-Object { Copy-Item $_.FullName $binDir }

          Get-ChildItem $buildDir -File |
            Where-Object { $_.Extension -in '.dll', '.manifest' } |
            ForEach-Object { Copy-Item $_.FullName $binDir }

          $manifest = @{
            platform = 'win32'
            arch = 'x64'
            generatedAt = (Get-Date).ToUniversalTime().ToString('o')
            nearbytesCommit = (git rev-parse HEAD)
            megacmdCommit = (git -C vendor/MEGAcmd rev-parse HEAD)
            megaSdkCommit = (git -C vendor/MEGAcmd/sdk rev-parse HEAD)
            commandDirectory = 'bin'
          } | ConvertTo-Json -Depth 4

          Set-Content -Path (Join-Path $bundleRoot 'manifest.json') -Value $manifest -Encoding utf8
          "BUNDLE_ROOT=$bundleRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Archive helper bundle
        shell: pwsh
        run: |
          $assetName = "nearbytes-megacmd-win32-x64.zip"
          $archivePath = Join-Path $PWD $assetName
          if (Test-Path $archivePath) {
            Remove-Item -Force $archivePath
          }
          Compress-Archive -Path $env:BUNDLE_ROOT -DestinationPath $archivePath
          "ASSET_PATH=$archivePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ASSET_NAME=$assetName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: nearbytes-megacmd-win32-x64
          path: ${{ env.ASSET_PATH }}

      - name: Create or update GitHub release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = '${{ inputs.release_tag }}'
          $title = '${{ inputs.release_title }}'
          $notesPath = Join-Path $env:RUNNER_TEMP 'megacmd-release-notes.md'
          @"
          Windows vendored MEGAcmd helper for Nearbytes.

          Source commit: $env:GITHUB_SHA
          Workflow run: $env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID
          "@ | Out-File -FilePath $notesPath -Encoding utf8

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            $releaseArgs = @('release', 'create', $tag, '--target', $env:GITHUB_SHA, '--title', $title, '--notes-file', $notesPath)
            if ('${{ inputs.prerelease }}' -eq 'true') {
              $releaseArgs += '--prerelease'
            }
            & gh @releaseArgs
          } else {
            $editArgs = @('release', 'edit', $tag, '--title', $title, '--notes-file', $notesPath)
            if ('${{ inputs.prerelease }}' -eq 'true') {
              $editArgs += '--prerelease'
            }
            & gh @editArgs
          }

          gh release upload $tag $env:ASSET_PATH --clobber